<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier</title>
</head>

<style>
    body{
        position: relative;
        z-index: 0;
    }

    body::before{/*cible l'image seule*/
    top: 0;/*colle en haut*/
    left: 0;/*colle a gauche*/
    width: 100%;/*prend toute la largeur*/
    height: 100%;/*prend toute la hauteur*/
    content: "";/*oblige pour afficher un pseudo-elemnet*/
    filter: brightness(90%);
    z-index: -1;/*met l'image derriere le contenue*/
    background-size:cover;/*l'image couvre tout l'elt*/
    background-image: url("Screenshot_20260325-204221.jpg");
    position: absolute;/*position l'elt par rapport au body*/
    background-repeat: no-repeat;/*empeche la duplication*/
    background-attachment: fixed;/*l'image reste fixe lorsqu'on scroll*/
}

    #date{
        width: 300px;
        height: 250px;
    }
    #titre{
        text-align: center;
    }

    #number{
        width: 300px;
        height: 28px;
    }

    #info{
        background-color: blue;
        text-align: center;
    }

    #consul{
        background-color: blue;
        text-align: center;
    }

    .taille{
        width: 300px;
        height: 24px;
    }

    .trait{
        width: 300px;
        height: 24px;
    }

    #exa{
        background-color: blue;
        text-align: center;
    }

    #med{
        text-align: end;
    }

    .medecin{
        width: 300px;
        height: 25px;
    }

</style>
<body>
    <header>
        <input type="text" placeholder="                   CACHET DE L'HOPITAL       " id="date">
        <h1 id="titre">DOSSIER MEDICAL PROFESSIONNEL</h1><br>
        <h2><strong>N° DE DOSSIER :</strong></h2>
        <input type="text" placeholder="10" id="number">
    </header>
    <div id="info">
        <h1>
            <b>INFORMATION DU PATIENT</b>
        </h1>
    </div>
    <div>
        <b>NOM:</b><br>
        <b><input type="text" name="nom" class="taille"><br><br>
        <b>PRENOM:</b><br>
        <input type="text" name="prenom" class="taille"><br><br>
        <b>AGE:</b><br>
        <input type="number" name="age" class="taille"><br><br>
        <b>ANTECEDENT MEDICAUX:</b><br>
        <input type="text" class="taille"><br><br>
        TELEPHONES:<br>
        <input type="tel" placeholder="12" class="taille"><br><br>
        <b>SEXE</b>:<br>
        <select class="taille">
            <option>
                M(masculin)
            </option>
            <option>
                F(feminin)
            </option>
        </select>
    </div>
    <div id="consul">
        <h1>
            <b>CONSULTATIONS DU PATIENT</b>
        </h1>
        DATE:<br>
        <b><input type="date" name="Date" class="trait"></b><br><br>
        MOTIF:<br>
        <b><input type="text" name="motif" class="trait"></b><br><br>
        DIAGNOSTIQUE:<br>
        <b><input type="text" name="diagnostique" class="trait"></b><br><br>
       TRAITEMENT:<br>
        <b><input type="text" name="traitement" class="trait"></b><br><br>
    </div>
    <div id="exa">
        <h1>
            <b>SUIVI</b>
        </h1>
        RENDEZ-VOUS:<br>
        <b><input type="text" name="rendez-vous" class="trait"></b><br><br>
        EVOLUTION:<br>
        <b><input type="text" name="evolution" class="trait"></b><br><br>
    </div>
    <div id="med">
        NOM DU MEDECIN:<br>
        <input type="text" name="nom" class="medecin"><br><br>
        SIGNATURE DU MEDECIN:<br>
        <input type="text" name="signature" class="medecin">
    </div>
</body>
</html>
